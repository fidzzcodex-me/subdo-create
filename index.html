<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CF Subdomain Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<style>
:root {
  --bg:#edf4fd; --card:#fff; --s2:#f4f9ff;
  --b100:#dbeafe; --b200:#bfdbfe; --b300:#93c5fd; --b400:#60a5fa; --b500:#3b82f6; --b600:#2563eb;
  --t900:#0f172a; --t600:#475569; --t400:#94a3b8; --bd:#e1eaf8;
  --r:10px; --rlg:16px;
  --sh:0 6px 28px rgba(37,99,235,.09),0 1px 4px rgba(37,99,235,.05);
  --shb:0 4px 14px rgba(37,99,235,.28);
}
[data-theme="dark"] {
  --bg:#0f172a; --card:#1e293b; --s2:#334155;
  --b100:#1e3a8a; --b200:#1e40af; --b300:#3b82f6; --b400:#60a5fa; --b500:#93c5fd; --b600:#bfdbfe;
  --t900:#f1f5f9; --t600:#cbd5e1; --t400:#94a3b8; --bd:#334155;
  --sh:0 6px 28px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.3);
  --shb:0 4px 14px rgba(59,130,246,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t900);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:0 16px 80px;overflow-x:hidden;transition:background.3s,color.3s}

/* bg blobs */
.blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:drift 22s ease-in-out infinite alternate}
.b1{width:480px;height:480px;background:radial-gradient(#bfdbfe,#93c5fd88);top:-80px;left:-60px}
.b2{width:360px;height:360px;background:radial-gradient(#dbeafe,#c7d2fe55);top:38%;right:-70px;animation-delay:-9s}
.b3{width:280px;height:280px;background:radial-gradient(#e0f2fe,#bae6fd44);bottom:8%;left:18%;animation-delay:-15s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-10px,16px) scale(.97)}}
.dotgrid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,#93c5fd2c 1px,transparent 1px);
  background-size:27px 27px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 40%,black,transparent)}

/* topbar */
.topbar{position:fixed;top:18px;right:18px;z-index:100;display:flex;gap:8px}
.topbar button{padding:6px 10px;border:1.5px solid var(--bd);border-radius:8px;background:var(--card);
  cursor:pointer;font-size:.7rem;font-weight:600;color:var(--t600);transition:all.2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.topbar button:hover{border-color:var(--b300);transform:translateY(-1px)}

/* layout */
.wrap{position:relative;z-index:1;width:100%;max-width:620px;display:flex;flex-direction:column;align-items:center;padding-top:54px}
.header{text-align:center;margin-bottom:26px;width:100%}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--b200);
  border-radius:100px;padding:4px 12px;font-size:.67rem;font-weight:600;color:var(--b600);margin-bottom:14px}
.pdot{width:6px;height:6px;background:var(--b500);border-radius:50%;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6);opacity:.4}}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4.5vw,2.4rem);font-weight:800;letter-spacing:-.8px}
.grad{background:linear-gradient(125deg,var(--b600),var(--b400));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{margin-top:8px;font-size:.84rem;color:var(--t600)}

/* card */
.card{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);
  padding:26px;box-shadow:var(--sh);position:relative;overflow:hidden;margin-bottom:20px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,var(--b300),var(--b600),var(--b300));background-size:200% auto;animation:bar 3.5s linear infinite}
@keyframes bar{to{background-position:200% center}}
.sec{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.sico{width:26px;height:26px;border-radius:7px;background:var(--s2);border:1px solid var(--b100);
  display:flex;align-items:center;justify-content:center}
.sico svg{width:13px;height:13px;color:var(--b500)}
.slbl{font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;color:var(--b600);letter-spacing:.7px;text-transform:uppercase}
.divider{height:1px;background:linear-gradient(90deg,var(--bd),transparent);margin:15px 0}

/* form */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg1{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label.lbl{font-size:.67rem;font-weight:600;color:var(--t600);letter-spacing:.38px;text-transform:uppercase}
.iw{position:relative}
.iw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t400);pointer-events:none}
.iw:focus-within svg{color:var(--b500)}
input,select{width:100%;padding:9px 12px 9px 33px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);
  color:var(--t900);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color.18s,background.18s}
select{padding-left:12px;cursor:pointer}
input:focus,select:focus{border-color:var(--b500);box-shadow:0 0 0 3px rgba(59,130,246,.11);background:var(--card)}
.hint{font-size:.66rem;color:var(--t400);margin-top:-4px}
.iw button{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px}
.iw button svg{position:static;transform:none;width:16px;height:16px}

/* proxy toggle */
.trow{display:flex;align-items:center;justify-content:space-between;border:1.5px solid;border-radius:var(--r);
  padding:10px 13px;cursor:pointer;transition:all.22s}
.trow.on{background:#fff7ed;border-color:#fed7aa}
.trow.off{background:var(--s2);border-color:var(--bd)}
[data-theme="dark"].trow.on{background:#451a03;border-color:#c2410c}
.tlbl{display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:500}
.sw{position:relative;width:38px;height:21px}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#cbd5e1;border-radius:21px;cursor:pointer;transition:.24s}
.sl::before{content:'';position:absolute;width:15px;height:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:transform.24s cubic-bezier(.34,1.56,.64,1)}
.sw input:checked +.sl{background:#f97316}
.sw input:checked +.sl::before{transform:translateX(17px)}

/* button */
.btn{width:100%;padding:12px;background:linear-gradient(130deg,var(--b600),var(--b400));
  border:none;border-radius:var(--r);color:#fff;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform.18s,box-shadow.18s}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:var(--shb)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn svg{width:15px;height:15px}
.btn.loading.sp{display:block}
.btn.loading.bt{opacity:.7}
.sp{display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* table */
.table-wrap{overflow-x:auto;border:1px solid var(--bd);border-radius:var(--r);margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--s2);padding:10px;text-align:left;font-weight:600;color:var(--t600);border-bottom:1px solid var(--bd)}
td{padding:10px;border-bottom:1px solid var(--bd)}
tr:hover{background:var(--s2)}
.del-btn{padding:4px 8px;background:#fee2e2;border:none;border-radius:6px;color:#dc2626;cursor:pointer;font-size:.7rem;font-weight:600}
.del-btn:hover{background:#fecaca}

/* toast */
.toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 16px;background:var(--card);
  border:1px solid var(--bd);border-radius:8px;box-shadow:var(--sh);display:none;align-items:center;gap:8px;
  animation:slideIn.3s ease-out}
.toast.show{display:flex}
.toast.ok{border-color:#86efac;background:#f0fdf4}
.toast.err{border-color:#fca5a5;background:#fef2f2}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="dotgrid"></div>

<div class="topbar">
  <button onclick="toggleTheme()">🌓 Theme</button>
  <button id="btnEN" class="on" onclick="setLang('en')">EN</button>
  <button id="btnID" onclick="setLang('id')">ID</button>
</div>

<div class="wrap">
  <header class="header" data-aos="fade-down">
    <div class="pill"><span class="pdot"></span>Cloudflare API v4</div>
    <h1><span class="grad">Subdomain</span> Creator</h1>
    <p class="sub" id="tSub">Manage DNS records via Cloudflare API.</p>
  </header>

  <!-- Form Card -->
  <div class="card" data-aos="fade-up">
    <div class="sec"><div class="sico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><span class="slbl" id="tSecAuth">Auth</span></div>
    <div class="divider"></div>

    <div class="fg1">
      <label class="lbl" for="zoneId">Zone ID</label>
      <div class="iw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
      <input type="text" id="zoneId" placeholder="Zone ID"/></div>
    </div>

    <div class="fg1">
      <label class="lbl" for="apiKey" id="tLblKey">API Token</label>
      <div class="iw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4"/></svg>
      <input type="password" id="apiKey" placeholder="DNS:Edit scope"/>
      <button type="button" onclick="togglePass()"><svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    </div>

    <div class="sec"><div class="sico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/></svg></div><span class="slbl" id="tSecDns">DNS Record</span></div>
    <div class="divider"></div>

    <div class="grid2">
      <div class="fg1">
        <label class="lbl" for="recordType">Type</label>
        <select id="recordType">
          <option value="A">A</option>
          <option value="AAAA">AAAA</option>
          <option value="CNAME">CNAME</option>
          <option value="TXT">TXT</option>
        </select>
      </div>
      <div class="fg1">
        <label class="lbl" for="ttlSelect">TTL</label>
        <select id="ttlSelect">
          <option value="1">Auto</option>
          <option value="120">120s</option>
          <option value="300">300s</option>
          <option value="600">600s</option>
          <option value="3600">1h</option>
        </select>
      </div>
    </div>

    <div class="fg1">
      <label class="lbl" for="subdomainName" id="tLblSub">Name</label>
      <div class="iw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/></svg>
      <input type="text" id="subdomainName" placeholder="panel"/></div>
      <p class="hint" id="tHintSub">Prefix only - domain from Zone ID</p>
    </div>

    <div class="fg1">
      <label class="lbl" for="ipTarget" id="tLblIp">Content/Value</label>
      <div class="iw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
      <input type="text" id="ipTarget" placeholder="1.2.3.4"/></div>
    </div>

    <div class="trow on" id="proxyRow" onclick="toggleProxy()">
      <span class="tlbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg><span id="tLblProxy">Proxied</span></span>
      <label class="sw" onclick="event.stopPropagation()"><input type="checkbox" id="proxied" checked onchange="syncProxy()"/><span class="sl"></span></label>
    </div>

    <button class="btn" id="btnCreate" type="button"><div class="sp"></div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg><span class="bt">Create Record</span></button>
    <button class="btn" id="btnList" type="button" style="margin-top:8px;background:linear-gradient(130deg,#64748b,#94a3b8)"><div class="sp"></div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M3 7l9 6 9-6"/></svg><span class="bt">Load Records</span></button>
  </div>

  <!-- List Card -->
  <div class="card" id="listCard" style="display:none" data-aos="fade-up">
    <div class="sec"><div class="sico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7"/></svg></div><span class="slbl">DNS Records</span></div>
    <div class="divider"></div>
    <div class="table-wrap"><table id="recordsTable"><thead><tr><th>Type</th><th>Name</th><th>Content</th><th>Proxied</th><th>Action</th></tr></thead><tbody id="recordsBody"></tbody></table></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script>
AOS.init({ once:true });
const $ = id => document.getElementById(id);
const LS = { z:'cf_zone', t:'cf_token', theme:'cf_theme' };

// Load saved
$('zoneId').value = localStorage.getItem(LS.z) || '';
$('apiKey').value = localStorage.getItem(LS.t) || '';
const savedTheme = localStorage.getItem(LS.theme) || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);

// Theme
function toggleTheme(){
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'dark'? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(LS.theme, next);
  showToast('Theme switched', 'ok');
}

// Password toggle
function togglePass(){
  const inp = $('apiKey');
  inp.type = inp.type === 'password'? 'text' : 'password';
}

// Proxy toggle
const proxyRow = $('proxyRow'), proxiedEl = $('proxied');
function syncProxy(){
  proxyRow.classList.toggle('on', proxiedEl.checked);
  proxyRow.classList.toggle('off',!proxiedEl.checked);
  $('tLblProxy').textContent = proxiedEl.checked? 'Proxied ON' : 'Proxied OFF';
}
function toggleProxy(){ proxiedEl.checked =!proxiedEl.checked; syncProxy(); }
syncProxy();

// Toast
function showToast(msg, type='ok'){
  const t = $('toast');
  $('toastText').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// IP validation
function validIP(ip, type){
  if(type === 'A') return /^(\d{1,3}\.){3}\d{1,3}$/.test(ip) && ip.split('.').every(n => n<=255);
  if(type === 'AAAA') return /^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$/.test(ip) || ip.includes('::');
  return true;
}

async function apiCall(action, data){
  const zone = $('zoneId').value.trim();
  const token = $('apiKey').value.trim();
  if(!zone ||!token) throw new Error('Zone ID & Token required');

  localStorage.setItem(LS.z, zone);
  localStorage.setItem(LS.t, token);

  const form = new FormData();
  form.append('action', action);
  form.append('zone', zone);
  form.append('token', token);
  Object.entries(data).forEach(([k,v]) => form.append(k, v));

  const res = await fetch('/api', { method:'POST', body:form });
  return res.json();
}

function setLoad(btn, on){
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

// CREATE
$('btnCreate').addEventListener('click', async () => {
  const btn = $('btnCreate');
  const type = $('recordType').value;
  const name = $('subdomainName').value.trim();
  const content = $('ipTarget').value.trim();
  const ttl = $('ttlSelect').value;
  const proxied = proxiedEl.checked;

  if(!name) return showToast('Name required', 'err');
  if(type === 'A' &&!validIP(content, 'A')) return showToast('Invalid IPv4', 'err');
  if(type === 'AAAA' &&!validIP(content, 'AAAA')) return showToast('Invalid IPv6', 'err');

  setLoad(btn, true);
  try{
    const data = await apiCall('create', { subdomain:name, ip:content, proxied, type, ttl });
    if(data.success){
      showToast(`✓ ${data.result.name} created`, 'ok');
      navigator.clipboard.writeText(data.result.name);
      showToast('Copied to clipboard', 'ok');
      $('subdomainName').value = '';
      $('ipTarget').value = '';
    } else {
      showToast(data.errors?.[0]?.message || 'Failed', 'err');
    }
  } catch(e){ showToast(e.message, 'err'); }
  setLoad(btn, false);
});

// LIST
$('btnList').addEventListener('click', async () => {
  const btn = $('btnList');
  setLoad(btn, true);
  try{
    const data = await apiCall('list', {});
    if(data.success){
      const body = $('recordsBody');
      body.innerHTML = data.result.map(r => `
        <tr>
          <td>${r.type}</td>
          <td>${r.name}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.content}</td>
          <td>${r.proxied? 'Yes' : 'No'}</td>
          <td><button class="del-btn" onclick="deleteRec('${r.id}')">Delete</button></td>
        </tr>
      `).join('');
      $('listCard').style.display = 'block';
      showToast(`${data.result.length} records loaded`, 'ok');
    } else {
      showToast(data.errors?.[0]?.message || 'Failed', 'err');
    }
  } catch(e){ showToast(e.message, 'err'); }
  setLoad(btn, false);
});

// DELETE
window.deleteRec = async (id) => {
  if(!confirm('Delete this record?')) return;
  try{
    const data = await apiCall('delete', { record_id:id });
    if(data.success){
      showToast('Record deleted', 'ok');
      $('btnList').click(); // refresh
    } else {
      showToast(data.errors?.[0]?.message || 'Failed', 'err');
    }
  } catch(e){ showToast(e.message, 'err'); }
}

// Hide proxy for TXT/CNAME
$('recordType').addEventListener('change', e => {
  proxyRow.style.display = e.target.value === 'TXT'? 'none' : 'flex';
});

// i18n basic
let lang='en';
const TX = {en:{tSub:'Manage DNS records via Cloudflare API',tSecAuth:'Auth',tSecDns:'DNS Record',tLblKey:'API Token',tLblSub:'Name',tLblIp:'Content/Value',tLblProxy:'Proxied',tHintSub:'Prefix only - domain from Zone ID'},
id:{tSub:'Kelola DNS record via Cloudflare API',tSecAuth:'Autentikasi',tSecDns:'DNS Record',tLblKey:'API Token',tLblSub:'Nama',tLblIp:'Isi/Nilai',tLblProxy:'Proxied',tHintSub:'Isi prefix saja - domain dari Zone ID'}};
function setLang(l){lang=l;document.getElementById('btnEN').classList.toggle('on',l==='en');document.getElementById('btnID').classList.toggle('on',l==='id');Object.keys(TX[l]).forEach(k=>{const el=$(k);if(el)el.textContent=TX[l][k]})}
</script>
</body>
</html>
